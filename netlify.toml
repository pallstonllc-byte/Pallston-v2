[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/initiatives#careoneconcept"
  to = "/CareOne.dc.html"
  status = 301

[[redirects]]
  from = "/initiatives#execboardconcept"
  to = "/ExecBoard.dc.html"
  status = 301

[[redirects]]
  from = "/initiatives#geoshieldconcept"
  to = "/GeoShield.dc.html"
  status = 301

[[redirects]]
  from = "/initiatives"
  to = "/CareOne.dc.html"
  status = 301

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
